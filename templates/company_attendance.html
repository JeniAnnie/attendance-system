{% extends 'base.html' %}

{% block content %}

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(135deg, #8B6F47 0%, #D4A574 100%);
    min-height: 100vh;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.attendance-container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 20px;
}

.header-section {
    background: linear-gradient(135deg, #FAF6F0 0%, #F5EFE7 100%);
    border-radius: 20px;
    padding: 30px;
    margin-bottom: 30px;
    box-shadow: 0 10px 40px rgba(139, 111, 71, 0.2);
    border: 2px solid #E8DCC8;
}

.header-title {
    font-size: 2.2em;
    color: #8B6F47;
    margin-bottom: 10px;
    font-weight: 700;
}

.header-date {
    color: #8B6F47;
    font-size: 1.1em;
    opacity: 0.8;
}

.scanner-section {
    background: linear-gradient(135deg, #FAF6F0 0%, #F5EFE7 100%);
    border-radius: 20px;
    padding: 30px;
    margin-bottom: 30px;
    box-shadow: 0 10px 40px rgba(139, 111, 71, 0.2);
    border: 2px solid #E8DCC8;
    text-align: center;
}

.scanner-title {
    font-size: 1.8em;
    color: #8B6F47;
    margin-bottom: 20px;
    font-weight: 600;
}

.scanner-display {
    width: 180px;
    height: 220px;
    margin: 0 auto 30px;
    background: linear-gradient(135deg, #8B6F47 0%, #6B5A47 100%);
    border-radius: 40px;
    border: 8px solid #D4A574;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    box-shadow: 0 20px 50px rgba(139, 111, 71, 0.3);
}

.fingerprint-icon {
    font-size: 80px;
    opacity: 0.7;
    animation: fingerprint-glow 2s ease-in-out infinite;
}

@keyframes fingerprint-glow {
    0%, 100% { 
        opacity: 0.5;
        text-shadow: 0 0 10px rgba(212, 165, 116, 0.4);
        transform: scale(1);
    }
    50% { 
        opacity: 0.9;
        text-shadow: 0 0 30px rgba(212, 165, 116, 0.8);
        transform: scale(1.1);
    }
}

.form-group {
    margin: 20px 0;
}

.form-group label {
    display: block;
    color: #8B6F47;
    font-weight: 600;
    margin-bottom: 8px;
    font-size: 1.05em;
}

.form-group select {
    width: 100%;
    padding: 12px;
    border: 2px solid #D4A574;
    border-radius: 10px;
    font-size: 1em;
    color: #2b2520;
    background: #FFFEF9;
    transition: all 0.3s;
}

.form-group select:focus {
    outline: none;
    border-color: #8B6F47;
    background: #FFFAF5;
    box-shadow: 0 0 10px rgba(139, 111, 71, 0.2);
}

.button-group {
    display: flex;
    gap: 15px;
    margin-top: 30px;
    flex-wrap: wrap;
}

.scan-btn {
    flex: 1;
    min-width: 150px;
    background: linear-gradient(135deg, #8B6F47 0%, #A0845A 100%);
    color: #FAF6F0;
    border: none;
    padding: 16px;
    font-size: 1.1em;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s;
    box-shadow: 0 10px 25px rgba(139, 111, 71, 0.3);
}

.scan-btn:hover:not(:disabled) {
    transform: translateY(-3px);
    box-shadow: 0 15px 40px rgba(139, 111, 71, 0.5);
}

.scan-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

.refresh-btn {
    flex: 1;
    min-width: 150px;
    background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
    color: white;
    border: none;
    padding: 16px;
    font-size: 1.1em;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
    transition: all 0.3s;
    box-shadow: 0 10px 25px rgba(39, 174, 96, 0.3);
}

.refresh-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 40px rgba(39, 174, 96, 0.5);
}

.status-message {
    margin-top: 20px;
    padding: 15px;
    border-radius: 10px;
    display: none;
    font-weight: 600;
    text-align: center;
}

.status-message.success {
    background: #d4edda;
    color: #155724;
    border: 2px solid #c3e6cb;
    display: block;
}

.status-message.error {
    background: #f8d7da;
    color: #721c24;
    border: 2px solid #f5c6cb;
    display: block;
}

.employees-table {
    background: linear-gradient(135deg, #FAF6F0 0%, #F5EFE7 100%);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(139, 111, 71, 0.2);
    border: 2px solid #E8DCC8;
    margin-top: 30px;
}

.table-header {
    background: linear-gradient(135deg, #8B6F47 0%, #A0845A 100%);
    color: #FAF6F0;
    padding: 20px;
    font-weight: 600;
}

.table-header h3 {
    font-size: 1.4em;
    margin-bottom: 10px;
}

.employees-list {
    max-height: 600px;
    overflow-y: auto;
}

.employee-row {
    border-bottom: 2px solid #E8DCC8;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: all 0.3s;
}

.employee-row:hover {
    background: #E8DCC8;
}

.employee-info {
    flex: 2;
}

.employee-name {
    font-weight: 700;
    color: #8B6F47;
    font-size: 1.05em;
}

.employee-id {
    color: #6B5A47;
    font-size: 0.9em;
}

.employee-status {
    flex: 1;
    text-align: center;
}

.status-badge {
    display: inline-block;
    padding: 8px 16px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 0.85em;
    color: white;
}

.status-checked-in {
    background: linear-gradient(135deg, #27ae60 0%, #229954 100%);
}

.status-checked-out {
    background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
}

.status-not-present {
    background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%);
}

.employee-time {
    flex: 2;
    text-align: right;
    color: #2b2520;
}

.time-info {
    font-size: 0.9em;
    margin: 3px 0;
}

.time-label {
    color: #8B6F47;
    font-weight: 600;
}

.attendance-type {
    flex: 1;
    text-align: center;
    color: #8B6F47;
    font-weight: 600;
}

@media (max-width: 768px) {
    .employee-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
    }

    .employee-status, .employee-time, .attendance-type {
        width: 100%;
        text-align: left;
    }

    .button-group {
        flex-direction: column;
    }

    .scan-btn, .refresh-btn {
        width: 100%;
    }
}

.home-button {
    text-align: center;
    margin-top: 30px;
}

.home-button a {
    display: inline-block;
    padding: 12px 30px;
    background: linear-gradient(135deg, #8B6F47 0%, #A0845A 100%);
    color: #FAF6F0;
    text-decoration: none;
    border-radius: 50px;
    font-weight: 600;
    transition: all 0.3s;
    box-shadow: 0 10px 25px rgba(139, 111, 71, 0.3);
}

.home-button a:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 40px rgba(139, 111, 71, 0.5);
}
</style>

<div class="attendance-container">
    
    <!-- Header -->
    <div class="header-section">
        <h1 class="header-title">🏢 Company Attendance System</h1>
        <p class="header-date">📅 {{ today.strftime('%A, %B %d, %Y') }}</p>
    </div>

    <!-- Biometric Scanner -->
    <div class="scanner-section">
        <h2 class="scanner-title">👆 Scan Your Fingerprint</h2>
        
        <div class="scanner-display">
            <div class="fingerprint-icon">👆</div>
        </div>

        <div class="form-group">
            <label for="attendance-type">📋 Select Attendance Type:</label>
            <select id="attendance-type">
                <option value="">-- Choose --</option>
                <option value="Onsite">🏢 Onsite</option>
                <option value="WFH">🏠 Work From Home (WFH)</option>
                <option value="Field">🌍 Field</option>
            </select>
        </div>

        <div class="button-group">
            <button class="scan-btn" id="scan-btn" onclick="startBiometricScan()">
                🔐 Start Scan
            </button>
            <button class="refresh-btn" onclick="loadEmployeeStatus()">
                🔄 Refresh Status
            </button>
        </div>

        <div id="status-message" class="status-message"></div>
    </div>

    <!-- Employees Status Table -->
    <div class="employees-table">
        <div class="table-header">
            <h3>👥 Employee Attendance Status</h3>
        </div>
        <div class="employees-list" id="employees-list">
            <p style="padding: 20px; text-align: center; color: #8B6F47;">Loading...</p>
        </div>
    </div>

    <!-- Home Button -->
    <div class="home-button">
        <a href="/">🏠 Back to Home</a>
    </div>
</div>

<script>
let scanning = false;

async function startBiometricScan() {
    const attendanceType = document.getElementById('attendance-type').value;
    
    if (!attendanceType) {
        showMessage('Please select an attendance type first', 'error');
        return;
    }

    scanning = true;
    const btn = document.getElementById('scan-btn');
    btn.disabled = true;
    btn.textContent = '⏳ Scanning...';

    try {
        // Get authentication options
        const optionsResponse = await fetch('/webauthn/auth-options', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            }
        });

        if (!optionsResponse.ok) {
            throw new Error('Failed to get authentication options');
        }

        const options = await optionsResponse.json();
        console.log('Auth options:', options);

        // Convert challenge from base64url to buffer
        options.challenge = base64urlToBuffer(options.challenge);

        // Convert allowCredentials
        if (options.allowCredentials) {
            options.allowCredentials = options.allowCredentials.map(cred => ({
                ...cred,
                id: base64urlToBuffer(cred.id)
            }));
        }

        // Request authentication
        const credential = await navigator.credentials.get({
            publicKey: options
        });

        if (!credential) {
            throw new Error('Authentication cancelled');
        }

        console.log('Authentication successful:', credential);

        // Send credential to check-in/check-out endpoint with attendance type
        const checkInResponse = await fetch('/biometric/checkin-checkout', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                credential_id: bufferToBase64url(credential.rawId),
                attendance_type: attendanceType
            })
        });

        const result = await checkInResponse.json();

        if (checkInResponse.ok) {
            showMessage(result.message, 'success');
            
            // Update employee list
            setTimeout(() => {
                loadEmployeeStatus();
            }, 1000);
        } else {
            showMessage(result.error || 'Check-in/Check-out failed', 'error');
        }

    } catch (error) {
        console.error('Biometric scan error:', error);
        showMessage('Fingerprint scan failed: ' + error.message, 'error');
    } finally {
        scanning = false;
        btn.disabled = false;
        btn.textContent = '🔐 Start Scan';
    }
}

async function loadEmployeeStatus() {
    try {
        const response = await fetch('/api/employees-status');
        const employees = await response.json();

        const list = document.getElementById('employees-list');
        
        if (!employees || employees.length === 0) {
            list.innerHTML = '<p style="padding: 20px; text-align: center; color: #8B6F47;">No employees enrolled</p>';
            return;
        }

        list.innerHTML = employees.map(emp => {
            const statusClass = emp.status === 'Checked In' ? 'status-checked-in' : 
                              emp.status === 'Checked Out' ? 'status-checked-out' : 'status-not-present';
            
            return `
                <div class="employee-row">
                    <div class="employee-info">
                        <div class="employee-name">${emp.emp_name}</div>
                        <div class="employee-id">ID: ${emp.emp_id}</div>
                    </div>
                    <div class="employee-status">
                        <span class="status-badge ${statusClass}">${emp.status}</span>
                    </div>
                    <div class="employee-time">
                        ${emp.check_in ? `<div class="time-info"><span class="time-label">In:</span> ${emp.check_in}</div>` : ''}
                        ${emp.check_out ? `<div class="time-info"><span class="time-label">Out:</span> ${emp.check_out}</div>` : ''}
                        ${emp.work_hours ? `<div class="time-info"><span class="time-label">Hours:</span> ${emp.work_hours.toFixed(2)}</div>` : ''}
                    </div>
                    <div class="attendance-type">
                        ${emp.attendance_type || '-'}
                    </div>
                </div>
            `;
        }).join('');

    } catch (error) {
        console.error('Error loading employee status:', error);
    }
}

function showMessage(message, type) {
    const msgDiv = document.getElementById('status-message');
    msgDiv.textContent = message;
    msgDiv.className = `status-message ${type}`;
    
    setTimeout(() => {
        msgDiv.className = 'status-message';
    }, 5000);
}

// Base64URL utilities
function bufferToBase64url(buffer) {
    const bytes = new Uint8Array(buffer);
    let binary = '';
    for (let i = 0; i < bytes.byteLength; i++) {
        binary += String.fromCharCode(bytes[i]);
    }
    return btoa(binary)
        .replace(/\+/g, '-')
        .replace(/\//g, '_')
        .replace(/=/g, '');
}

function base64urlToBuffer(base64url) {
    const base64 = base64url
        .replace(/-/g, '+')
        .replace(/_/g, '/');
    const padLen = (4 - (base64.length % 4)) % 4;
    const padded = base64 + '='.repeat(padLen);
    const binary = atob(padded);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
    }
    return bytes.buffer;
}

// Load employee status on page load
document.addEventListener('DOMContentLoaded', function() {
    loadEmployeeStatus();
    
    // Refresh every 30 seconds
    setInterval(loadEmployeeStatus, 30000);
});
</script>

{% endblock %}
