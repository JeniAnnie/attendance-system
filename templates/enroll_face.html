{% extends 'base.html' %}

{% block title %}Enroll Face - GoDigital{% endblock %}

{% block content %}

<div class="glass" style="max-width:700px; margin:2rem auto; padding:2.5rem;">
    <h1 style="font-size:2.3rem; text-align:center; margin-bottom:1rem; background:linear-gradient(135deg,#a78bfa,#7c3aed); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">
        <i class="fas fa-camera"></i> Face Enrollment
    </h1>
    <p style="color:var(--muted); text-align:center; margin-bottom:2rem;">Position your face in the camera frame and click Capture</p>

    <!-- Video + Capture -->
    <div style="position:relative; width:100%; max-width:640px; margin:0 auto 2rem;">
        <video id="video" autoplay playsinline style="width:100%; border-radius:16px; box-shadow:var(--shadow);"></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <div id="overlay" style="position:absolute; top:0; left:0; width:100%; height:100%; border:4px solid #a78bfa; border-radius:16px; pointer-events:none;"></div>
    </div>

    <!-- Form -->
    <form id="enroll-form" method="POST" action="{{ url_for('attendance.enroll_face') }}">
        <div class="glass" style="margin-bottom:1.5rem;">
            <label style="display:block; margin-bottom:0.6rem; color:var(--muted);">Employee ID</label>
            <input type="text" name="emp_id" required placeholder="EMP001" style="width:100%; padding:1rem; background:rgba(30,35,55,0.7); border:1px solid var(--border); border-radius:12px; color:white; font-size:1.1rem;">
        </div>

        <div class="glass" style="margin-bottom:1.5rem;">
            <label style="display:block; margin-bottom:0.6rem; color:var(--muted);">Full Name</label>
            <input type="text" name="name" required placeholder="Jenifer Annie" style="width:100%; padding:1rem; background:rgba(30,35,55,0.7); border:1px solid var(--border); border-radius:12px; color:white; font-size:1.1rem;">
        </div>

        <div class="glass" style="margin-bottom:2rem;">
            <label style="display:block; margin-bottom:0.6rem; color:var(--muted);">Department</label>
            <select name="department" style="width:100%; padding:1rem; background:rgba(30,35,55,0.7); border:1px solid var(--border); border-radius:12px; color:white; font-size:1.1rem;">
                <option value="">Select Department</option>
                <option value="IT">IT</option>
                <option value="HR">HR</option>
                <option value="Finance">Finance</option>
                <option value="Sales">Sales</option>
            </select>
        </div>

        <!-- Hidden field for captured image -->
        <input type="hidden" name="image" id="captured-image">

        <button type="button" id="capture-btn" class="btn btn-primary" style="width:100%; font-size:1.3rem; padding:1.3rem;">
            <i class="fas fa-camera"></i> Capture Face & Enroll
        </button>
    </form>

    <p id="status" style="margin-top:1.5rem; font-size:1.1rem; min-height:2rem;"></p>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const captureBtn = document.getElementById('capture-btn');
const status = document.getElementById('status');
const imageInput = document.getElementById('captured-image');

let stream = null;

// Start camera
async function startCamera() {
    try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
        video.srcObject = stream;
    } catch (err) {
        status.textContent = 'Camera access denied or not available';
        status.style.color = 'var(--danger)';
    }
}

captureBtn.addEventListener('click', async () => {
    if (!video.srcObject) {
        startCamera();
        return;
    }

    // Capture frame
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);

    // Convert to base64
    const imageData = canvas.toDataURL('image/jpeg', 0.85);
    imageInput.value = imageData;

    status.textContent = 'Processing...';
    status.style.color = 'var(--accent)';

    // Submit form
    document.getElementById('enroll-form').submit();
});

// Start camera on page load
window.addEventListener('load', startCamera);

// Stop camera on leave
window.addEventListener('beforeunload', () => {
    if (stream) stream.getTracks().forEach(track => track.stop());
});
</script>

{% endblock %}
