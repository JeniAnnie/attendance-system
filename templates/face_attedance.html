{% extends 'base.html' %}

{% block title %}Face Recognition Attendance - GoDigital{% endblock %}

{% block content %}

<div class="glass" style="max-width:800px; margin:0 auto; padding:2.5rem; text-align:center;">
    <h1 style="font-size:2.4rem; margin-bottom:0.8rem; background:linear-gradient(135deg,#a78bfa,#7c3aed); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">
        <i class="fas fa-camera"></i> Face Recognition Attendance
    </h1>
    <p style="color:var(--muted); font-size:1.15rem; margin-bottom:2.5rem;">Look at the camera for automatic recognition and check-in</p>

    <!-- Video Feed Container -->
    <div style="position:relative; width:100%; max-width:640px; margin:0 auto 2rem;">
        <video id="video" autoplay playsinline style="width:100%; border-radius:16px; box-shadow:var(--shadow);"></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <div id="recognition-overlay" style="position:absolute; top:0; left:0; width:100%; height:100%; border-radius:16px; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; color:white; font-size:2rem; opacity:0; transition:opacity 0.3s;">
            <i class="fas fa-spinner fa-spin"></i> Recognizing...
        </div>
    </div>

    <button id="start-recognition" class="btn btn-primary" style="font-size:1.3rem; padding:1.2rem; margin-bottom:1rem;">
        <i class="fas fa-play"></i> Start Face Recognition
    </button>

    <div id="result-message" style="font-size:1.2rem; margin-top:1rem; min-height:2rem;"></div>

    <p style="margin-top:2rem; color:var(--muted); font-size:0.95rem;">
        <i class="fas fa-info-circle"></i> Ensure good lighting and face the camera directly
    </p>
</div>

<script>
let video, canvas, ctx;
let stream = null;

document.getElementById('start-recognition').addEventListener('click', async () => {
    const btn = document.getElementById('start-recognition');
    const overlay = document.getElementById('recognition-overlay');
    const message = document.getElementById('result-message');
    
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
    overlay.style.opacity = 1;
    message.textContent = '';

    try {
        // Start video
        stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
        video = document.getElementById('video');
        canvas = document.getElementById('canvas');
        ctx = canvas.getContext('2d');
        video.srcObject = stream;
        await new Promise(resolve => video.onloadedmetadata = resolve);

        // Capture frame and send to server
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const imageData = canvas.toDataURL('image/jpeg', 0.8);

        const response = await fetch('/recognize-face', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: imageData })
        });

        const result = await response.json();
        if (result.success) {
            message.innerHTML = `<span style="color:var(--success);"><i class="fas fa-check"></i> ${result.message}</span>`;
            message.className = 'success';
        } else {
            message.innerHTML = `<span style="color:var(--danger);"><i class="fas fa-times"></i> ${result.message}</span>`;
            message.className = 'error';
        }
    } catch (error) {
        message.innerHTML = `<span style="color:var(--danger);"><i class="fas fa-times"></i> Error: ${error.message}</span>`;
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-play"></i> Start Face Recognition';
        overlay.style.opacity = 0;
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
        }
    }
});
</script>

{% endblock %}
