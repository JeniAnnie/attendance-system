<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Face Recognition</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <h2>Face Recognition</h2>
    <div id="camera">
        <video id="video" width="320" height="240" autoplay></video>
        <canvas id="canvas" width="320" height="240" style="display:none;"></canvas>
        <button id="detect-btn">Detect Face</button>
    </div>
    <div id="emp-details" style="display:none; margin-top:2rem;"></div>
    <script>
        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(function(stream) {
                    document.getElementById('video').srcObject = stream;
                });
        }
        function detectFace() {
            var canvas = document.getElementById('canvas');
            var video = document.getElementById('video');
            canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
            var imageData = canvas.toDataURL('image/png');
            fetch('/recognize_face', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: imageData })
            }).then(response => response.json())
              .then(data => {
                if (data.success) {
                    var details = document.getElementById('emp-details');
                    details.style.display = 'block';
                    details.innerHTML = `<h3>Employee Details</h3>
                        <p><strong>ID:</strong> ${data.emp_id}</p>
                        <p><strong>Name:</strong> ${data.emp_name}</p>
                        <p><strong>Department:</strong> ${data.department}</p>`;
                } else {
                    alert('Face not recognized.');
                }
              });
        }
        document.getElementById('detect-btn').onclick = detectFace;
        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
